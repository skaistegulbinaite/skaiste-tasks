<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a0a0e">
    <title>Skaiste Tasks</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a0a0e;
            --surface: #241318;
            --surface2: #2e1a20;
            --surface3: #3d2229;
            --text: #fff5f5;
            --text2: #c4949e;
            --text3: #7a4a55;
            --border: #3a1f28;
            --accent: #f5c6d0;
            --accent2: #e8a0b0;
            --accent-bg: rgba(245,198,208,0.08);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:'Manrope',system-ui,-apple-system,sans-serif;
            background:var(--bg); color:var(--text);
            min-height:100dvh; overflow-x:hidden;
            padding-top:var(--safe-top);
            padding-bottom:calc(76px + var(--safe-bottom));
        }

        /* ── SVG ICONS ── */
        .icon { display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
        .icon svg { width:100%; height:100%; }

        /* ── HEADER ── */
        .header {
            padding:16px 20px 12px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .header-left {}
        .header-label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:1px; }
        .header-date { font-family:'Bowlby One',sans-serif; font-size:28px; font-weight:400; letter-spacing:-0.5px; line-height:1.15; margin-top:1px; }
        .header-stats { display:flex; gap:6px; }
        .stat-pill {
            background:var(--surface2); border-radius:20px; padding:5px 11px;
            font-size:11px; font-weight:600; color:var(--text2);
            display:flex; align-items:center; gap:4px;
        }
        .stat-pill .num { color:var(--text); }
        .stat-pill.overdue { color:#e88a8a; }
        .stat-pill.overdue .num { color:#e88a8a; }

        /* ── MONTH NAV ── */
        .month-nav {
            display:flex; align-items:center; justify-content:space-between;
            padding:4px 20px 8px;
        }
        .month-label { font-family:'Bowlby One',sans-serif; font-size:16px; font-weight:400; letter-spacing:-0.2px; }
        .month-arrows { display:flex; gap:4px; }
        .month-arrows button {
            background:var(--surface2); border:none; color:var(--text2);
            width:32px; height:32px; border-radius:10px;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:background .15s;
        }
        .month-arrows button:active { background:var(--surface3); }
        .month-arrows button svg { width:16px; height:16px; }
        .btn-today {
            font-size:11px; font-weight:700; color:var(--bg);
            background:var(--accent); padding:6px 10px; border-radius:10px;
            border:none; cursor:pointer; letter-spacing:0.3px;
            white-space:nowrap; flex-shrink:0;
        }
        .btn-today:active { opacity:0.7; }

        /* ── MONTH GRID ── */
        .month-grid { padding:0 12px 6px; }
        .mg-header {
            display:grid; grid-template-columns:repeat(7,1fr); gap:0;
            padding:0 2px; margin-bottom:4px;
        }
        .mg-header span {
            text-align:center; font-size:10px; font-weight:600;
            color:var(--text3); text-transform:uppercase; letter-spacing:0.5px;
            padding:4px 0;
        }
        .mg-body {
            display:grid; grid-template-columns:repeat(7,1fr); gap:3px;
        }
        .mg-cell {
            min-height:56px; border-radius:12px; padding:3px;
            cursor:pointer; transition:background .15s;
            background:var(--surface); position:relative;
            overflow:hidden;
        }
        .mg-cell:active { background:var(--surface3); }
        .mg-cell.other-month { background:transparent; opacity:0.3; }
        .mg-cell.today .mg-num {
            background:var(--accent); color:var(--bg); border-radius:6px;
            width:22px; height:22px; display:flex; align-items:center; justify-content:center;
        }
        .mg-cell.selected { outline:2px solid var(--accent); outline-offset:-2px; }
        .mg-num {
            font-size:11px; font-weight:700; color:var(--text2);
            padding:1px 3px; display:inline-flex;
        }
        .mg-cell.has-tasks .mg-num { color:var(--text); }
        .mg-tasks { margin-top:1px; }
        .mg-task {
            font-size:7px; font-weight:600; line-height:1.1;
            padding:1.5px 3px; border-radius:3px; margin-bottom:1px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            color:#fff;
        }
        .mg-more { font-size:7px; color:var(--text3); padding:0 3px; font-weight:600; }

        /* ── FILTER SECTION ── */
        .filters { padding:4px 16px 8px; }
        .filter-row {
            display:flex; gap:5px; align-items:center; margin-bottom:5px;
        }
        .filter-row:last-child { margin-bottom:0; }
        .filter-label {
            font-size:9px; font-weight:700; color:var(--text3);
            text-transform:uppercase; letter-spacing:0.8px;
            flex:0 0 auto; min-width:52px;
        }
        .filter-pills {
            display:flex; gap:4px; overflow-x:auto; scrollbar-width:none;
        }
        .filter-pills::-webkit-scrollbar { display:none; }
        .filter-pill {
            flex:0 0 auto; padding:5px 11px; border-radius:8px;
            font-size:11px; font-weight:600; cursor:pointer;
            background:var(--surface2); color:var(--text2);
            border:none; transition:all .15s;
            display:flex; align-items:center; gap:5px;
        }
        .filter-pill:active { transform:scale(0.95); }
        .filter-pill.active { background:var(--accent); color:var(--bg); }
        .filter-pill.active .fp-dot { opacity:0.7; }
        .filter-pill .fp-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

        /* ── DAY VIEW ── */
        .day-view { padding:0 16px 16px; }
        .day-header {
            display:flex; align-items:baseline; justify-content:space-between;
            padding:10px 2px 8px; border-bottom:1px solid var(--border);
            margin-bottom:10px;
        }
        .day-title { font-family:'Bowlby One',sans-serif; font-size:20px; font-weight:400; letter-spacing:-0.3px; }
        .day-total {
            font-size:12px; font-weight:600; color:var(--text2);
            display:flex; align-items:center; gap:5px;
        }

        /* ── TASK CARDS ── */
        .task-card {
            background:var(--surface); border-radius:18px;
            padding:14px; margin-bottom:8px;
            display:flex; gap:12px; align-items:flex-start;
            transition:all .25s ease; position:relative;
            border:1px solid var(--border); overflow:hidden;
            cursor:pointer;
        }
        .task-card::before {
            content:''; position:absolute; left:0; top:0; bottom:0;
            width:3.5px; border-radius:3px 0 0 3px;
        }
        .task-card.done {
            opacity:0.5; padding:8px 12px;
            gap:8px; align-items:center;
        }
        .task-card.done .task-title {
            text-decoration:line-through; color:var(--text3);
            font-size:12px; margin-bottom:0;
        }
        .task-card.done .task-meta,
        .task-card.done .task-desc,
        .task-card.done .task-footer { display:none; }
        .task-card.done.expanded .task-meta,
        .task-card.done.expanded .task-desc,
        .task-card.done.expanded .task-footer { display:flex; }
        .task-card.done.expanded {
            padding:14px; gap:12px; align-items:flex-start;
        }
        .task-card.done.expanded .task-title { font-size:14px; margin-bottom:3px; }

        .task-check {
            flex:0 0 24px; height:24px; border-radius:50%;
            border:2px solid var(--text3); background:transparent;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:all .2s; margin-top:1px;
        }
        .task-card.done .task-check { flex:0 0 20px; height:20px; }
        .task-card.done.expanded .task-check { flex:0 0 24px; height:24px; }
        .task-check:active { transform:scale(0.85); }
        .task-check .check-svg { opacity:0; transition:opacity .15s; }
        .task-card.done .task-check .check-svg { opacity:1; }

        .task-body { flex:1; min-width:0; }
        .task-meta { display:flex; align-items:center; gap:6px; margin-bottom:4px; flex-wrap:wrap; }
        .task-project {
            font-size:10px; font-weight:700; padding:2px 7px;
            border-radius:5px; text-transform:uppercase; letter-spacing:0.4px;
        }
        .task-type {
            font-size:10px; font-weight:600; color:var(--text3);
            text-transform:uppercase; letter-spacing:0.4px;
        }
        .overdue-badge {
            font-size:9px; font-weight:700; color:#f5a0b0;
            background:rgba(245,160,176,0.12); padding:2px 6px;
            border-radius:5px; text-transform:uppercase; letter-spacing:0.4px;
        }
        .task-title { font-size:14px; font-weight:700; line-height:1.3; margin-bottom:3px; }
        .task-desc { font-size:12px; color:var(--text2); line-height:1.35; white-space:pre-line; }
        .task-desc-wrap { position:relative; }
        .copy-btn {
            position:absolute; top:0; right:0;
            width:28px; height:28px; border-radius:7px;
            background:var(--surface3); border:1px solid var(--border);
            color:var(--text2); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:all .2s; opacity:0.7;
        }
        .copy-btn:active { transform:scale(0.85); }
        .copy-btn:hover, .copy-btn:focus { opacity:1; background:var(--accent); color:var(--bg); }
        .copy-btn svg { width:14px; height:14px; }
        .copy-btn.copied { background:#4ade80; color:#000; opacity:1; }
        .copy-btn.copied svg { display:none; }
        .copy-btn.copied::after { content:'✓'; font-size:14px; font-weight:700; }
        .copy-toast {
            position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px);
            background:#4ade80; color:#000; font-weight:700; font-size:14px;
            padding:10px 24px; border-radius:12px;
            box-shadow:0 4px 20px rgba(74,222,128,0.4);
            opacity:0; transition:all .3s ease; z-index:9999;
            pointer-events:none;
        }
        .copy-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        /* ── THREE DOT MENU ── */
        .task-menu-btn {
            position:absolute; top:8px; right:8px;
            width:28px; height:28px; border-radius:7px;
            background:transparent; border:none;
            color:var(--text3); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:all .2s; opacity:0.5; z-index:2;
        }
        .task-menu-btn:hover, .task-menu-btn:active { opacity:1; background:var(--surface3); }
        .task-menu-btn svg { width:16px; height:16px; }
        .task-card { position:relative; }
        /* ── ACTION SHEET ── */
        .action-sheet-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.5);
            z-index:9998; opacity:0; transition:opacity .2s;
            pointer-events:none;
        }
        .action-sheet-overlay.show { opacity:1; pointer-events:auto; }
        .action-sheet {
            position:fixed; bottom:0; left:0; right:0;
            background:var(--surface1); border-radius:16px 16px 0 0;
            padding:12px 16px calc(env(safe-area-inset-bottom, 16px) + 16px);
            z-index:9999; transform:translateY(100%);
            transition:transform .3s cubic-bezier(0.4,0,0.2,1);
        }
        .action-sheet-overlay.show .action-sheet { transform:translateY(0); }
        .action-sheet-handle {
            width:36px; height:4px; background:var(--border);
            border-radius:2px; margin:0 auto 12px;
        }
        .action-sheet-title {
            font-size:13px; font-weight:700; color:var(--text2);
            text-align:center; margin-bottom:12px;
        }
        .action-sheet-btn {
            width:100%; padding:14px 16px; border:none;
            background:var(--surface2); color:var(--text1);
            font-size:15px; font-weight:600; border-radius:12px;
            cursor:pointer; margin-bottom:8px; text-align:left;
            display:flex; align-items:center; gap:10px;
            transition:background .15s;
        }
        .action-sheet-btn:active { background:var(--surface3); }
        .action-sheet-btn.danger { color:#ff4466; }
        .action-sheet-btn svg { width:18px; height:18px; flex-shrink:0; }
        .action-sheet-cancel {
            width:100%; padding:14px; border:none;
            background:var(--surface3); color:var(--text2);
            font-size:15px; font-weight:700; border-radius:12px;
            cursor:pointer; text-align:center; margin-top:4px;
        }
        /* ── EDIT MODAL ── */
        .edit-modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.5);
            z-index:10000; display:none; align-items:center; justify-content:center;
        }
        .edit-modal-overlay.show { display:flex; }
        .edit-modal {
            background:var(--surface1); border-radius:16px;
            padding:24px; width:calc(100% - 40px); max-width:400px;
            position:relative; z-index:10001;
        }
        .edit-modal h3 { margin:0 0 16px; font-size:16px; color:var(--text1); }
        .edit-field { margin-bottom:12px; }
        .edit-field label {
            display:block; font-size:12px; font-weight:600;
            color:var(--text2); margin-bottom:4px;
        }
        .edit-field input, .edit-field select {
            width:100%; padding:10px 12px; border-radius:10px;
            border:1px solid var(--border); background:var(--surface2);
            color:var(--text1); font-size:16px;
            -webkit-appearance:none; appearance:none;
            box-sizing:border-box;
            -webkit-user-select:auto; user-select:auto;
            touch-action:manipulation;
            pointer-events:auto !important;
            position:relative; z-index:10002;
        }
        .edit-field input[type="date"] {
            -webkit-appearance:none; appearance:none;
            min-height:44px;
        }
        .edit-field select {
            min-height:44px;
        }
        .edit-field input:focus, .edit-field select:focus {
            outline:2px solid var(--accent); border-color:var(--accent);
        }
        .edit-btns { display:flex; gap:8px; margin-top:16px; }
        .edit-btns button {
            flex:1; padding:12px; border:none; border-radius:10px;
            font-size:14px; font-weight:700; cursor:pointer;
        }
        .edit-btn-cancel { background:var(--surface3); color:var(--text2); }
        .edit-btn-save { background:var(--accent); color:var(--bg); }
        .task-footer { display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
        .task-tag {
            display:flex; align-items:center; gap:4px;
            font-size:11px; font-weight:600; color:var(--text2);
            background:var(--surface2); padding:3px 8px; border-radius:6px;
        }
        .task-tag .icon { width:13px; height:13px; }

        /* ── PRIORITY DOTS ── */
        .priority-dots { display:flex; gap:3px; align-items:center; }
        .priority-dots .p-dot {
            width:6px; height:6px; border-radius:50%;
        }
        .priority-dots .p-dot.filled { background:var(--accent); }
        .priority-dots .p-dot.empty { background:var(--surface3); }
        .priority-dots.p1 .p-dot.filled { background:#a8d8b9; }
        .priority-dots.p2 .p-dot.filled { background:#f0c9a0; }
        .priority-dots.p3 .p-dot.filled { background:#f5a0b0; }

        /* ── EMPTY STATE ── */
        .empty-state { text-align:center; padding:48px 20px; }
        .empty-state .icon { width:40px; height:40px; margin:0 auto 10px; color:var(--text3); }
        .empty-title { font-family:'Bowlby One',sans-serif; font-size:16px; font-weight:400; margin-bottom:4px; }
        .empty-sub { font-size:13px; color:var(--text3); }

        /* ── PROJECTS VIEW ── */
        .projects-view { padding:0 16px 16px; display:none; }
        .section-title { font-family:'Bowlby One',sans-serif; font-size:16px; font-weight:400; padding:12px 2px 10px; letter-spacing:-0.2px; }
        .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
        .summary-card {
            background:var(--surface); border-radius:18px;
            padding:14px; border:1px solid var(--border);
        }
        .sc-label { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; }
        .sc-value { font-family:'Bowlby One',sans-serif; font-size:26px; font-weight:400; margin-top:3px; letter-spacing:-0.5px; }
        .sc-sub { font-size:11px; color:var(--text2); margin-top:1px; }
        .sc-icon { display:flex; align-items:center; gap:5px; }
        .sc-icon .icon { width:14px; height:14px; color:var(--text3); }

        .project-card {
            background:var(--surface); border-radius:18px;
            padding:16px; margin-bottom:8px;
            border:1px solid var(--border); cursor:pointer;
            transition:all .15s; position:relative; overflow:hidden;
        }
        .project-card::before {
            content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
        }
        .project-card:active { transform:scale(0.98); }
        .project-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .project-name { font-family:'Bowlby One',sans-serif; font-size:17px; font-weight:400; display:flex; align-items:center; gap:8px; }
        .project-name .p-dot { width:10px; height:10px; border-radius:50%; }
        .project-count { font-size:12px; font-weight:600; color:var(--text2); }
        .project-bar { height:5px; border-radius:3px; background:var(--surface3); overflow:hidden; }
        .project-bar-fill { height:100%; border-radius:3px; transition:width .5s ease; }
        .project-stats { display:flex; gap:14px; margin-top:8px; }
        .project-stat { font-size:11px; color:var(--text2); }
        .project-stat strong { color:var(--text); }

        /* ── IDEAS VIEW ── */
        .ideas-view { padding:0 16px 16px; display:none; }
        .idea-input-wrap {
            background:var(--surface); border:1px solid var(--border);
            border-radius:18px; padding:12px; margin-bottom:12px;
        }
        .idea-textarea {
            width:100%; background:transparent; border:none; color:var(--text);
            font-family:inherit; font-size:14px; resize:none; outline:none;
            min-height:60px;
        }
        .idea-textarea::placeholder { color:var(--text3); }
        .idea-actions { display:flex; justify-content:flex-end; gap:8px; align-items:center; margin-top:8px; }
        .idea-mic-btn {
            width:36px; height:36px; border-radius:50%;
            background:var(--surface2); border:2px solid var(--border);
            color:var(--text2); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:all .3s cubic-bezier(0.4,0,0.2,1); flex-shrink:0;
            position:relative;
        }
        .idea-mic-btn:active { transform:scale(0.85); }
        .idea-mic-btn.recording {
            width:44px; height:44px;
            background:#ff4466; color:#fff;
            border-color:#ff4466; border-radius:12px;
            animation:micPulse 1s ease-in-out infinite;
            box-shadow:0 0 20px rgba(255,68,102,0.5);
        }
        .idea-mic-btn.recording svg { width:16px; height:16px; }
        .idea-mic-btn svg { width:18px; height:18px; transition:all .2s; }
        @keyframes micPulse {
            0%, 100% { box-shadow:0 0 8px rgba(255,68,102,0.4), 0 0 20px rgba(255,68,102,0.2); transform:scale(1); }
            50% { box-shadow:0 0 16px rgba(255,68,102,0.6), 0 0 40px rgba(255,68,102,0.3); transform:scale(1.08); }
        }
        .voice-status {
            font-size:11px; color:var(--accent2); font-weight:600;
            flex:1; text-align:left;
        }
        .voice-status.active { color:#ff4466; animation:statusBlink 1.5s ease-in-out infinite; }
        @keyframes statusBlink {
            0%, 100% { opacity:1; }
            50% { opacity:0.5; }
        }
        .idea-save-btn {
            background:var(--accent); color:var(--bg); border:none;
            padding:7px 18px; border-radius:8px; font-family:inherit;
            font-size:12px; font-weight:700; cursor:pointer;
        }
        .idea-save-btn:active { opacity:0.8; }
        .idea-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:18px; padding:14px; margin-bottom:8px;
            position:relative; animation:fadeUp .25s ease both;
        }
        .idea-text { font-size:13px; line-height:1.4; color:var(--text); white-space:pre-wrap; }
        .idea-time { font-size:10px; color:var(--text3); margin-top:6px; }
        .idea-delete {
            position:absolute; top:10px; right:10px;
            background:none; border:none; color:var(--text3);
            font-size:16px; cursor:pointer; padding:4px;
            line-height:1;
        }
        .idea-delete:active { color:var(--text); }
        .idea-count-badge {
            background:var(--accent2); color:var(--bg); font-size:8px; font-weight:700;
            width:14px; height:14px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            position:absolute; top:-2px; right:-2px;
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0;
            background:rgba(26,10,14,0.94);
            -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px);
            border-top:1px solid var(--border);
            display:flex; justify-content:space-around;
            padding:8px 0 calc(8px + var(--safe-bottom));
            z-index:200;
        }
        .nav-btn {
            background:none; border:none; color:var(--text3);
            display:flex; flex-direction:column; align-items:center;
            gap:3px; cursor:pointer; padding:4px 16px;
            font-family:inherit; transition:color .15s;
            position:relative;
        }
        .nav-btn.active { color:var(--accent); }
        .nav-btn .icon { width:20px; height:20px; }
        .nav-btn span { font-size:10px; font-weight:600; letter-spacing:0.2px; }

        /* ── ADD TASK BUTTON ── */
        .add-btn {
            position:fixed; bottom:calc(84px + var(--safe-bottom)); right:16px;
            width:48px; height:48px; border-radius:50%;
            background:var(--accent); color:var(--bg); border:none;
            font-size:26px; font-weight:300; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 4px 20px rgba(245,198,208,0.3); z-index:150;
            transition:transform .15s;
        }
        .add-btn:active { transform:scale(0.9); }

        /* ── ADD TASK MODAL ── */
        .modal-overlay {
            display:none; position:fixed; inset:0; background:rgba(26,10,14,0.85);
            z-index:300; flex-direction:column;
            -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
        }
        .modal-overlay.open { display:flex; }
        .modal-spacer { flex:0 0 auto; min-height:60px; }
        .modal {
            background:var(--surface); border-radius:20px 20px 0 0;
            width:100%; max-width:500px; padding:16px 20px calc(16px + var(--safe-bottom));
            animation:slideUp .25s ease;
            margin:0 auto; flex:1; overflow-y:auto;
            -webkit-overflow-scrolling:touch;
        }
        @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
        .modal-title { font-family:'Bowlby One',sans-serif; font-size:16px; font-weight:400; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
        .modal-close { background:none; border:none; color:var(--text3); font-size:22px; cursor:pointer; padding:4px; }
        .modal-field { margin-bottom:10px; }
        .modal-field label { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:4px; }
        .modal-field input, .modal-field select, .modal-field textarea {
            width:100%; background:var(--surface2); border:1px solid var(--border);
            border-radius:10px; padding:9px 12px; color:var(--text);
            font-family:inherit; font-size:14px; outline:none;
        }
        .modal-field textarea { resize:none; height:48px; }
        .modal-field select { appearance:none; }
        .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .modal-row.triple { grid-template-columns:1fr 1fr 1fr; }
        .modal-submit {
            width:100%; padding:12px; border-radius:12px; border:none;
            background:var(--accent); color:var(--bg); font-family:inherit;
            font-size:14px; font-weight:700; cursor:pointer; margin-top:4px;
        }
        .modal-submit:active { opacity:0.8; }

        /* ── LOADING ── */
        .loading { display:flex; align-items:center; justify-content:center; padding:60px 20px; flex-direction:column; gap:10px; }
        .spinner { width:28px; height:28px; border:2.5px solid var(--surface3); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── ANIM ── */
        .task-card { animation:fadeUp .25s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        ::-webkit-scrollbar { width:0; }

        /* ── PIN LOCK ── */
        .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--text3); transition:all .15s; }
        .pin-dot.filled { background:var(--accent); border-color:var(--accent); }
        .pin-btn {
            width:68px; height:68px; border-radius:50%;
            background:var(--surface); border:1px solid var(--border);
            color:var(--text); font-family:'Bowlby One',sans-serif;
            font-size:24px; cursor:pointer; display:flex;
            align-items:center; justify-content:center;
            transition:background .15s; margin:0 auto;
        }
        .pin-btn:active { background:var(--surface3); }
        .pin-btn.del { font-size:14px; font-family:'Poppins',sans-serif; font-weight:600; color:var(--text2); }
    </style>
</head>
<body>

<!-- ── PIN LOCK SCREEN ── -->
<div id="lockScreen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;">
    <div style="font-family:'Bowlby One',sans-serif;font-size:48px;margin-bottom:8px;color:var(--text)">W</div>
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:32px">Skaiste Tasks</div>
    <div id="pinDots" style="display:flex;gap:12px;margin-bottom:24px"></div>
    <div id="pinPad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;width:100%"></div>
    <div id="pinError" style="font-size:12px;color:#e88a8a;margin-top:16px;opacity:0;transition:opacity .3s"></div>
</div>

<div class="header">
    <div class="header-left">
        <div class="header-label">Skaiste Tasks</div>
        <div class="header-date" id="headerDate"></div>
    </div>
    <div class="header-stats" id="headerStats"></div>
</div>

<div class="month-nav">
    <div class="month-label" id="monthLabel"></div>
    <div class="month-arrows">
        <button onclick="shiftMonth(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <button class="btn-today" onclick="goToToday()">Today</button>
        <button onclick="shiftMonth(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg></button>
    </div>
</div>

<div class="month-grid" id="monthGrid"></div>

<div class="filters" id="filterBar"></div>

<div class="day-view" id="dayView">
    <div class="loading" id="loadingState">
        <div class="spinner"></div>
    </div>
</div>

<div class="projects-view" id="projectsView"></div>

<div class="ideas-view" id="ideasView"></div>

<button class="add-btn" id="addBtn" onclick="handleAddBtn()">+</button>
<div class="copy-toast" id="copyToast">✓ Copied!</div>

<!-- ACTION SHEET (three dot menu) -->
<div class="action-sheet-overlay" id="actionSheet" onclick="closeActionSheet()">
    <div class="action-sheet" onclick="event.stopPropagation()">
        <div class="action-sheet-handle"></div>
        <div class="action-sheet-title" id="actionSheetTitle">Task options</div>
        <button class="action-sheet-btn" onclick="editTaskFromMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit task
        </button>
        <button class="action-sheet-btn danger" onclick="deleteTaskFromMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Delete task
        </button>
        <button class="action-sheet-cancel" onclick="closeActionSheet()">Cancel</button>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="edit-modal-overlay" id="editModal">
    <div class="edit-modal-backdrop" onclick="closeEditModal()" style="position:absolute;inset:0;z-index:0;"></div>
    <div class="edit-modal" style="position:relative;z-index:1;">
        <h3>Edit task</h3>
        <div class="edit-field">
            <label for="editTitle">Title</label>
            <input type="text" id="editTitle" autocomplete="off" autocorrect="off">
        </div>
        <div class="edit-field">
            <label for="editDate">Date</label>
            <input type="date" id="editDate">
        </div>
        <div class="edit-field">
            <label for="editPriority">Priority</label>
            <select id="editPriority">
                <option value="1">🟢 Low</option>
                <option value="2">🟡 Medium</option>
                <option value="3">🔴 High</option>
            </select>
        </div>
        <div class="edit-field">
            <label for="editDuration">Duration (minutes)</label>
            <input type="number" id="editDuration" min="5" step="5">
        </div>
        <div class="edit-btns">
            <button class="edit-btn-cancel" onclick="closeEditModal()">Cancel</button>
            <button class="edit-btn-save" onclick="saveEditTask()">Save</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-spacer" onclick="closeAddTask()"></div>
    <div class="modal">
        <div class="modal-title">New task <button class="modal-close" onclick="closeAddTask()">&times;</button></div>
        <div class="modal-field">
            <label>Title</label>
            <input type="text" id="atTitle" placeholder="Task name...">
        </div>
        <div class="modal-field">
            <label>Description</label>
            <textarea id="atDesc" placeholder="Optional details..."></textarea>
        </div>
        <div class="modal-row">
            <div class="modal-field">
                <label>Project</label>
                <select id="atProject"></select>
            </div>
            <div class="modal-field">
                <label>Date</label>
                <input type="date" id="atDate">
            </div>
        </div>
        <div class="modal-row triple">
            <div class="modal-field">
                <label>Duration (min)</label>
                <input type="number" id="atDuration" value="30" min="5" step="5">
            </div>
            <div class="modal-field">
                <label>Device</label>
                <select id="atDevice">
                    <option value="phone">Phone</option>
                    <option value="computer">Computer</option>
                </select>
            </div>
            <div class="modal-field">
                <label>Priority</label>
                <select id="atPriority">
                    <option value="1">Low</option>
                    <option value="2" selected>Medium</option>
                    <option value="3">High</option>
                </select>
            </div>
        </div>
        <button class="modal-submit" onclick="saveNewTask()">Add task</button>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchView('calendar')" id="navCal">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span>Month</span>
    </button>
    <button class="nav-btn" onclick="switchView('projects')" id="navProj">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span>
        <span>Projects</span>
    </button>
    <button class="nav-btn" onclick="switchView('ideas')" id="navIdeas">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 4 12.7V17a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-2.3A7 7 0 0 1 12 2z"/><line x1="9" y1="21" x2="15" y2="21"/></svg></span>
        <span>Ideas</span>
        <div id="ideaBadge" style="display:none"></div>
    </button>
</nav>

<script>
// ── PIN LOCK ──
const PIN_HASH = '9630';
const isUnlocked = localStorage.getItem('app_unlocked') === 'yes';

if (!isUnlocked) {
    document.getElementById('lockScreen').style.display = 'flex';
    document.querySelector('.header').style.display = 'none';
    document.querySelector('.month-nav').style.display = 'none';
    document.getElementById('monthGrid').style.display = 'none';
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('dayView').style.display = 'none';
    document.getElementById('addBtn').style.display = 'none';
    document.querySelector('.bottom-nav').style.display = 'none';

    let pinEntry = '';
    const dotsEl = document.getElementById('pinDots');
    const padEl = document.getElementById('pinPad');
    const errEl = document.getElementById('pinError');

    for (let i = 0; i < 4; i++) dotsEl.innerHTML += '<div class="pin-dot"></div>';

    [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(n => {
        if (n === '') { padEl.innerHTML += '<div></div>'; return; }
        const cls = n === '⌫' ? 'pin-btn del' : 'pin-btn';
        padEl.innerHTML += `<button class="${cls}" onclick="pinPress('${n}')">${n}</button>`;
    });

    window.pinPress = function(n) {
        if (n === '⌫') { pinEntry = pinEntry.slice(0,-1); }
        else if (pinEntry.length < 4) { pinEntry += n; }

        const dots = dotsEl.querySelectorAll('.pin-dot');
        dots.forEach((d,i) => d.classList.toggle('filled', i < pinEntry.length));

        if (pinEntry.length === 4) {
            if (pinEntry === PIN_HASH) {
                localStorage.setItem('app_unlocked', 'yes');
                document.getElementById('lockScreen').style.display = 'none';
                document.querySelector('.header').style.display = '';
                document.querySelector('.month-nav').style.display = '';
                document.getElementById('monthGrid').style.display = '';
                document.getElementById('filterBar').style.display = '';
                document.getElementById('dayView').style.display = '';
                document.getElementById('addBtn').style.display = '';
                document.querySelector('.bottom-nav').style.display = '';
            } else {
                errEl.textContent = 'Wrong PIN';
                errEl.style.opacity = '1';
                pinEntry = '';
                setTimeout(() => {
                    dots.forEach(d => d.classList.remove('filled'));
                    errEl.style.opacity = '0';
                }, 800);
            }
        }
    };
} else {
    document.getElementById('lockScreen').style.display = 'none';
}

// ── SVG ICON TEMPLATES ──
const ICONS = {
    clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    laptop: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="2" y1="20" x2="22" y2="20"/></svg>',
    phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>',
    sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="16 10 11 15 8 12"/></svg>',
};

function icon(name, size) {
    return `<span class="icon" style="width:${size||14}px;height:${size||14}px">${ICONS[name]}</span>`;
}

function priorityDots(level) {
    const cls = 'priority-dots p' + level;
    let dots = '';
    for (let i = 1; i <= 3; i++) {
        dots += `<span class="p-dot ${i <= level ? 'filled' : 'empty'}"></span>`;
    }
    return `<span class="${cls}">${dots}</span>`;
}

// ── STATE ──
let DATA = null;
let viewMonth = new Date().getMonth();
let viewYear = new Date().getFullYear();
let selectedDate = new Date();
let currentView = 'calendar';
let activeFilter = 'all';
let priorityFilter = 'all';
let doneIds = JSON.parse(localStorage.getItem('doneTasks3') || '{}');
let ideas = JSON.parse(localStorage.getItem('skaiste_ideas') || '[]');

// ── GITHUB SYNC CONFIG ──
const GH_REPO = 'skaistegulbinaite/skaiste-tasks';
const GH_IDEAS_PATH = 'ideas.json';
let ghToken = localStorage.getItem('gh_token') || '';
let ghIdeasSha = null; // track the file SHA for updates

const LT_DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const LT_DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const LT_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

init();

async function init() {
    try {
        const r = await fetch('tasks.json?v=' + Date.now());
        DATA = await r.json();
        loadCustomTasks();
    } catch {
        document.getElementById('loadingState').innerHTML = '<div class="empty-title" style="color:var(--text3)">Failed to load</div>';
        return;
    }
    render();
    updateIdeaBadge();
    loadIdeasFromGitHub();
}

function fmt(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtYMD(y,m,d) {
    return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}
function isToday(y,m,d) { const t=new Date(); return t.getFullYear()===y && t.getMonth()===m && t.getDate()===d; }
function isSel(y,m,d) { return selectedDate.getFullYear()===y && selectedDate.getMonth()===m && selectedDate.getDate()===d; }

function render() {
    renderHeader();
    renderMonthGrid();
    renderFilters();
    if (currentView === 'calendar') renderDayView();
    else if (currentView === 'projects') renderProjectsView();
    else if (currentView === 'ideas') renderIdeasView();
}

function renderHeader() {
    const t = new Date();
    document.getElementById('headerDate').textContent = LT_MONTHS[t.getMonth()] + ' ' + t.getDate();
    if (!DATA) return;
    const ts = fmt(t);
    const todayTasks = DATA.tasks.filter(x => x.date === ts);
    const dc = todayTasks.filter(x => doneIds[x.id]).length;
    const overdue = DATA.tasks.filter(x => x.date < ts && !doneIds[x.id]).length;
    let h = '';
    if (todayTasks.length) h += `<div class="stat-pill"><span class="num">${dc}/${todayTasks.length}</span></div>`;
    if (overdue) h += `<div class="stat-pill overdue"><span class="num">${overdue}</span> overdue</div>`;
    document.getElementById('headerStats').innerHTML = h;
}

function renderMonthGrid() {
    document.getElementById('monthLabel').textContent = LT_MONTHS[viewMonth] + ' ' + viewYear;

    const first = new Date(viewYear, viewMonth, 1);
    const startDow = (first.getDay() + 6) % 7;
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const prevDays = new Date(viewYear, viewMonth, 0).getDate();

    let html = '<div class="mg-header">';
    LT_DAYS.forEach(d => html += `<span>${d}</span>`);
    html += '</div><div class="mg-body">';

    for (let i = startDow - 1; i >= 0; i--) {
        const day = prevDays - i;
        html += `<div class="mg-cell other-month"><span class="mg-num">${day}</span></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = fmtYMD(viewYear, viewMonth, d);
        const today = isToday(viewYear, viewMonth, d);
        const sel = isSel(viewYear, viewMonth, d);
        const dayTasks = DATA ? DATA.tasks.filter(t => t.date === dateStr) : [];
        const hasTasks = dayTasks.length > 0;

        let cls = 'mg-cell';
        if (today) cls += ' today';
        if (sel) cls += ' selected';
        if (hasTasks) cls += ' has-tasks';

        let taskHtml = '';
        if (dayTasks.length > 0) {
            const show = dayTasks.slice(0, 2);
            show.forEach(t => {
                const p = DATA.projects[t.project];
                const done = doneIds[t.id];
                const opacity = done ? '0.4' : '1';
                taskHtml += `<div class="mg-task" style="background:${p.color};opacity:${opacity}">${t.title}</div>`;
            });
            if (dayTasks.length > 2) {
                taskHtml += `<div class="mg-more">+${dayTasks.length - 2}</div>`;
            }
        }

        html += `<div class="${cls}" onclick="selectDate(${viewYear},${viewMonth},${d})">
            <span class="mg-num">${d}</span>
            <div class="mg-tasks">${taskHtml}</div>
        </div>`;
    }

    const totalCells = startDow + daysInMonth;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let i = 1; i <= remaining; i++) {
        html += `<div class="mg-cell other-month"><span class="mg-num">${i}</span></div>`;
    }

    html += '</div>';
    document.getElementById('monthGrid').innerHTML = html;
}

function renderFilters() {
    const bar = document.getElementById('filterBar');
    if (!DATA) { bar.innerHTML = ''; return; }

    const pill = (key, label, extra) => {
        const active = activeFilter === key ? 'active' : '';
        return `<div class="filter-pill ${active}" onclick="setFilter('${key}')">${extra||''}${label}</div>`;
    };

    const ppill = (key, label, extra) => {
        const active = priorityFilter === key ? 'active' : '';
        return `<div class="filter-pill ${active}" onclick="setPriorityFilter('${key}')">${extra||''}${label}</div>`;
    };

    let row1 = pill('all', 'All', '');
    row1 += pill('phone', 'Phone', icon('phone', 12));
    row1 += pill('computer', 'Computer', icon('laptop', 12));

    let row2 = '';
    Object.entries(DATA.projects).forEach(([k,v]) => {
        row2 += pill(k, v.name, `<span class="fp-dot" style="background:${v.color}"></span>`);
    });

    let row3 = ppill('all', 'All', '');
    row3 += ppill('3', 'High', priorityDots(3));
    row3 += ppill('2', 'Medium', priorityDots(2));
    row3 += ppill('1', 'Low', priorityDots(1));

    bar.innerHTML = `
        <div class="filter-row">
            <span class="filter-label">Type</span>
            <div class="filter-pills">${row1}</div>
        </div>
        <div class="filter-row">
            <span class="filter-label">Project</span>
            <div class="filter-pills">${row2}</div>
        </div>
        <div class="filter-row">

function renderDayView() {
    const container = document.getElementById('dayView');
    if (!DATA) return;

    const dateStr = fmt(selectedDate);
    const todayStr = fmt(new Date());
    let tasks = DATA.tasks.filter(t => t.date === dateStr);
    tasks = applyFilter(tasks);
    // Sort: undone first, then by priority (high first), then done
    tasks.sort((a,b) => {
        const da = doneIds[a.id] ? 1 : 0;
        const db = doneIds[b.id] ? 1 : 0;
        if (da !== db) return da - db;
        return (b.priority||2) - (a.priority||2);
    });

    const totalMin = tasks.reduce((s,t) => s + (doneIds[t.id] ? 0 : (t.duration||0)), 0);
    const isOverdue = dateStr < todayStr;

    if (!tasks.length) {
        const dayName = LT_DAYS_FULL[selectedDate.getDay()];
        container.innerHTML = `<div class="empty-state">
            <div class="icon" style="width:40px;height:40px;margin:0 auto 10px;color:var(--text3)">${ICONS.sun}</div>

    // Group by project for smart scheduling
    const grouped = groupByProject(tasks);

    grouped.forEach((t,i) => {

            </button>
            <button class="task-check" style="border-color:${done?'transparent':p.color};background:${done?p.color:'transparent'}" onclick="event.stopPropagation();toggleTask('${t.id}')">
                <svg class="check-svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>

// ── COPY TO CLIPBOARD ──
function copyText(btn, taskId) {
    const task = DATA.tasks.find(t => t.id === taskId);
    if (!task || !task.copyText) { console.log('No copyText for', taskId, DATA.tasks.map(t=>t.id)); return; }

    const text = task.copyText;
    let success = false;

    // Method 1: Modern clipboard API
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
            showCopied(btn);
        }).catch(() => {
            // If clipboard API fails, try fallback
            fallbackCopy(text, btn);
        });
        return;
    }

    // Method 2: Fallback for iOS Safari
    fallbackCopy(text, btn);
}

function fallbackCopy(text, btn) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    ta.style.opacity = '0';
    ta.setAttribute('readonly', '');
    document.body.appendChild(ta);

    // iOS specific
    const range = document.createRange();
    const sel = window.getSelection();
    sel.removeAllRanges();

    ta.contentEditable = true;
    ta.readOnly = false;

    range.selectNodeContents(ta);
    sel.addRange(range);
    ta.setSelectionRange(0, text.length);

    try {
        document.execCommand('copy');
        showCopied(btn);
    } catch(e) {
        console.log('Copy failed', e);
    }
    document.body.removeChild(ta);
}

function showCopied(btn) {
    btn.classList.add('copied');
    if (navigator.vibrate) navigator.vibrate(30);

    // Show toast
    const toast = document.getElementById('copyToast');
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
        btn.classList.remove('copied');
    }, 1500);
}

// Smart scheduling: group tasks by project, keeping done at bottom
function groupByProject(tasks) {
    const undone = tasks.filter(t => !doneIds[t.id]);
    const done = tasks.filter(t => doneIds[t.id]);

    // Group undone by project
    const projectGroups = {};
    undone.forEach(t => {
        if (!projectGroups[t.project]) projectGroups[t.project] = [];
        projectGroups[t.project].push(t);
    });

    // Sort groups: biggest group first (main project), then by highest priority task
    const sorted = Object.values(projectGroups).sort((a,b) => {
        const maxA = Math.max(...a.map(t => t.priority||2));
        const maxB = Math.max(...b.map(t => t.priority||2));
        if (maxB !== maxA) return maxB - maxA;
        return b.length - a.length;
    });

    // Within each group, sort by priority desc
    const result = [];
    sorted.forEach(group => {
        group.sort((a,b) => (b.priority||2) - (a.priority||2));
        result.push(...group);
    });

    return [...result, ...done];
}

// ── VOICE RECORDING ──
let recognition = null;
let isRecording = false;
const MIC_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
const STOP_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';

function toggleVoice() {
    if (isRecording) {
        stopVoice();
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        const status = document.getElementById('voiceStatus');
        status.textContent = 'Voice not supported — type your idea instead';
        status.classList.add('active');
        setTimeout(() => { status.textContent = ''; status.classList.remove('active'); }, 3000);
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = navigator.language || 'en-US';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    const input = document.getElementById('ideaInput');
    const micBtn = document.getElementById('micBtn');
    const status = document.getElementById('voiceStatus');
    let finalTranscript = input.value;
    let restartCount = 0;

    recognition.onstart = () => {
        isRecording = true;
        micBtn.classList.add('recording');
        micBtn.innerHTML = STOP_SVG;
        status.textContent = '● Recording...';
        status.classList.add('active');
        // Vibrate on phones that support it
        if (navigator.vibrate) navigator.vibrate(50);
    };

    recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) {
                finalTranscript += (finalTranscript ? ' ' : '') + e.results[i][0].transcript;
            } else {
                interim += e.results[i][0].transcript;
            }
        }
        input.value = finalTranscript + (interim ? ' ' + interim : '');
        // Auto-resize textarea
        input.style.height = 'auto';
        input.style.height = Math.max(60, input.scrollHeight) + 'px';
        status.textContent = '● Recording...';
    };

    recognition.onerror = (e) => {
        console.log('Speech error:', e.error);
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
            status.textContent = '⚠ Allow microphone in browser settings';
            status.classList.add('active');
            setTimeout(() => { status.textContent = ''; status.classList.remove('active'); }, 4000);
            stopVoice();
        } else if (e.error === 'no-speech') {
            status.textContent = '● Listening... speak now';
        } else if (e.error !== 'aborted') {
            status.textContent = '⚠ ' + e.error;
            setTimeout(() => { status.textContent = isRecording ? '● Recording...' : ''; }, 2000);
        }
    };

    recognition.onend = () => {
        if (isRecording && restartCount < 10) {
            restartCount++;
            try { recognition.start(); } catch(e) { stopVoice(); }
        } else if (isRecording) {
            stopVoice();
        }
    };

    try {
        recognition.start();
    } catch(e) {
        status.textContent = '⚠ Could not start — try again';
        status.classList.add('active');
        setTimeout(() => { status.textContent = ''; status.classList.remove('active'); }, 3000);
    }
}

function stopVoice() {
    isRecording = false;
    if (recognition) {
        try { recognition.stop(); } catch(e) {}
        recognition = null;
    }
    const micBtn = document.getElementById('micBtn');
    const status = document.getElementById('voiceStatus');
    if (micBtn) {
        micBtn.classList.remove('recording');
        micBtn.innerHTML = MIC_SVG;
    }
    if (status) {
        status.textContent = '';
        status.classList.remove('active');
    }
    if (navigator.vibrate) navigator.vibrate(30);
}

// ── GITHUB SYNC ──
async function loadIdeasFromGitHub() {
    if (!ghToken) return;
    try {
        const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_IDEAS_PATH}`, {
            headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!res.ok) return;
        const data = await res.json();
        ghIdeasSha = data.sha;
        const content = JSON.parse(atob(data.content));
        if (Array.isArray(content)) {
            // Merge: keep local ideas + add any from GitHub not in local
            const localIds = new Set(ideas.map(i => i.id));
            content.forEach(gi => { if (!localIds.has(gi.id)) ideas.push(gi); });
            // Also add local-only ideas to the merged set
            const ghIds = new Set(content.map(i => i.id));
            const merged = [...content];
            ideas.forEach(li => { if (!ghIds.has(li.id)) merged.push(li); });
            ideas = merged;
            localStorage.setItem('skaiste_ideas', JSON.stringify(ideas));
            renderIdeasView();
            updateIdeaBadge();
        }
    } catch(e) { console.log('GitHub ideas load failed:', e); }
}

async function syncIdeasToGitHub() {
    if (!ghToken) return;
    try {
        // Get current SHA first
        const getRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_IDEAS_PATH}`, {
            headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (getRes.ok) {
            const getData = await getRes.json();
            ghIdeasSha = getData.sha;
        }
        const body = {
            message: 'Sync ideas',
            content: btoa(unescape(encodeURIComponent(JSON.stringify(ideas, null, 2)))),
            branch: 'main'
        };
        if (ghIdeasSha) body.sha = ghIdeasSha;
        const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_IDEAS_PATH}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify(body)
        });
        if (res.ok) {
            const result = await res.json();
            ghIdeasSha = result.content.sha;
            showSyncStatus('Synced ✓');
        } else {
            showSyncStatus('Sync failed');
        }
    } catch(e) { console.log('GitHub sync failed:', e); showSyncStatus('Sync failed'); }
}

function showSyncStatus(msg) {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    el.textContent = msg;
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

    const current = ghToken ? '••••' + ghToken.slice(-4) : 'Not set';

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── INTERACTIONS ──
function selectDate(y,m,d) {
    selectedDate = new Date(y,m,d);
    viewYear = y; viewMonth = m;
    render();
}

function goToToday() {
    const t = new Date();
    selectedDate = t;
    viewYear = t.getFullYear(); viewMonth = t.getMonth();
    render();
}

function shiftMonth(dir) {
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    render();
}

function toggleTask(id) {
    if (doneIds[id]) delete doneIds[id];
    else doneIds[id] = Date.now();
    localStorage.setItem('doneTasks3', JSON.stringify(doneIds));
    render();
}

function expandDone(el, id) {
    el.classList.toggle('expanded');
}

function setFilter(key) { activeFilter = key; render(); }
function setPriorityFilter(key) { priorityFilter = key; render(); }

function applyFilter(tasks) {
    let filtered = tasks;
    if (activeFilter === 'phone') filtered = filtered.filter(t => t.device === 'phone');
    else if (activeFilter === 'computer') filtered = filtered.filter(t => t.device === 'computer');
    else if (activeFilter !== 'all') filtered = filtered.filter(t => t.project === activeFilter);

    if (priorityFilter !== 'all') {
        const pf = parseInt(priorityFilter);
        filtered = filtered.filter(t => (t.priority||2) === pf);
    }
    return filtered;
}

function switchView(view) {
    currentView = view;
    document.getElementById('dayView').style.display = view === 'calendar' ? 'block' : 'none';
    document.getElementById('projectsView').style.display = view === 'projects' ? 'block' : 'none';
    document.getElementById('ideasView').style.display = view === 'ideas' ? 'block' : 'none';
    document.getElementById('monthGrid').style.display = view === 'calendar' ? 'block' : 'none';
    document.querySelector('.month-nav').style.display = view === 'calendar' ? 'flex' : 'none';
    document.getElementById('filterBar').style.display = view === 'calendar' ? 'block' : 'none';
    document.getElementById('navCal').classList.toggle('active', view === 'calendar');
    document.getElementById('navProj').classList.toggle('active', view === 'projects');
    document.getElementById('navIdeas').classList.toggle('active', view === 'ideas');
    render();
}

function filterByProject(key) { activeFilter = key; switchView('calendar'); }

function handleAddBtn() {
    if (currentView === 'ideas') {
        document.getElementById('ideaInput').focus();
    } else {
        openAddTask();
    }
}

function fmtTime(min) {
    if (min >= 60) return Math.floor(min/60) + 'h' + (min%60 ? ' ' + min%60 + 'min' : '');
    return min + 'min';
}

// ── MANUAL TASK CREATION ──
let customTasks = JSON.parse(localStorage.getItem('customTasks') || '[]');

function loadCustomTasks() {
    if (DATA && customTasks.length) {
        customTasks.forEach(t => {
            if (!DATA.tasks.find(x => x.id === t.id)) DATA.tasks.push(t);
        });
    }
    // Apply saved edits
    const edits = JSON.parse(localStorage.getItem('skaiste_task_edits') || '{}');
    Object.entries(edits).forEach(([id, edit]) => {
        const task = DATA.tasks.find(t => t.id === id);
        if (task) {
            if (edit.title) task.title = edit.title;
            if (edit.date) task.date = edit.date;
            if (edit.priority) task.priority = edit.priority;
            if (edit.duration) task.duration = edit.duration;
        }
    });
    // Apply saved deletions
    const deleted = JSON.parse(localStorage.getItem('skaiste_task_deleted') || '[]');
    if (deleted.length) {
        DATA.tasks = DATA.tasks.filter(t => !deleted.includes(t.id));
    }
}

function openAddTask() {
    const sel = document.getElementById('atProject');
    if (DATA && sel.options.length === 0) {
        Object.entries(DATA.projects).forEach(([k,v]) => {
            sel.innerHTML += `<option value="${k}">${v.name}</option>`;
        });
    }
    document.getElementById('atDate').value = fmt(selectedDate);
    document.getElementById('addModal').classList.add('open');
}

function closeAddTask() {
    document.getElementById('addModal').classList.remove('open');
}

function saveNewTask() {
    const title = document.getElementById('atTitle').value.trim();
    if (!title) return;
    const task = {
        id: 'c' + Date.now(),
        date: document.getElementById('atDate').value,
        project: document.getElementById('atProject').value,
        title: title,
        desc: document.getElementById('atDesc').value.trim(),
        type: 'task',
        duration: parseInt(document.getElementById('atDuration').value) || 30,
        device: document.getElementById('atDevice').value,
        priority: parseInt(document.getElementById('atPriority').value) || 2
    };
    customTasks.push(task);
    localStorage.setItem('customTasks', JSON.stringify(customTasks));
    DATA.tasks.push(task);
    document.getElementById('atTitle').value = '';
    document.getElementById('atDesc').value = '';
    closeAddTask();
    render();
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
