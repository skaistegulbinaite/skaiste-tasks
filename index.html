<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skaistė Tasks</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --border: #1e1e1e;
            --fg: #f0f0f0;
            --dim: #666;
            --done: #2a2a2a;
            --accent: #68b2ff;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        html { background: var(--bg); }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            padding-top: var(--safe-top);
            padding-bottom: calc(72px + var(--safe-bottom));
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            padding: 20px 20px 0;
            margin-bottom: 8px;
        }
        .header-greeting {
            font-size: 14px;
            color: var(--dim);
            font-weight: 500;
        }
        .header-date {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.02em;
            margin-top: 2px;
        }
        .header-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--dim);
        }
        .header-stats strong {
            color: var(--accent);
            font-weight: 700;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 0;
            padding: 16px 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            flex-shrink: 0;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--dim);
            background: none;
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 8px;
        }
        .tab.active {
            background: var(--fg);
            color: var(--bg);
            border-color: var(--fg);
        }

        /* ===== SECTIONS ===== */
        .section {
            padding: 0 20px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-count {
            background: var(--border);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }

        /* ===== TASK CARDS ===== */
        .task {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .task.done {
            opacity: 0.4;
            background: var(--done);
        }
        .task.done .task-title {
            text-decoration: line-through;
            color: var(--dim);
        }
        .task-check {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-radius: 50%;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-top: 1px;
        }
        .task.done .task-check {
            background: var(--accent);
            border-color: var(--accent);
        }
        .task.done .task-check::after {
            content: '✓';
            color: var(--bg);
            font-size: 13px;
            font-weight: 800;
        }
        .task-body { flex: 1; min-width: 0; }
        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .task-project {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            letter-spacing: 0.04em;
        }
        .task-date-badge {
            font-size: 11px;
            color: var(--dim);
            font-weight: 500;
        }
        .task-type-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .type-faq { background: #3b2667; color: #c9a0ff; }
        .type-foto { background: #0f3a1e; color: #6ee7a0; }
        .type-vieta { background: #3b2a0f; color: #fcd47a; }
        .type-sezonas { background: #3b0f2a; color: #f9a8d4; }
        .type-task { background: #0f2a3b; color: #68b2ff; }
        .task-title {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: -0.01em;
        }
        .task-desc {
            font-size: 13px;
            color: var(--dim);
            margin-top: 4px;
            line-height: 1.4;
        }

        /* ===== EMPTY STATE ===== */
        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--dim);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-text {
            font-size: 15px;
            font-weight: 600;
        }
        .empty-sub {
            font-size: 13px;
            margin-top: 4px;
        }

        /* ===== OVERDUE HIGHLIGHT ===== */
        .task.overdue {
            border-color: #4a1c1c;
        }
        .task.overdue .task-date-badge {
            color: #ff6b6b;
            font-weight: 700;
        }

        /* ===== TODAY HIGHLIGHT ===== */
        .task.today-task {
            border-color: #1a3a5c;
            background: #0d1f33;
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(72px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-icon { font-size: 22px; }
        .nav-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--dim);
            letter-spacing: 0.04em;
        }
        .nav-item.active .nav-label { color: var(--accent); }

        /* ===== PROGRESS BAR ===== */
        .progress-wrap {
            padding: 0 20px;
            margin-bottom: 20px;
        }
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--dim);
            margin-top: 6px;
        }

        /* ===== WEEK VIEW ===== */
        .week-strip {
            display: flex;
            gap: 4px;
            padding: 0 20px 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .week-strip::-webkit-scrollbar { display: none; }
        .week-day {
            flex-shrink: 0;
            width: 48px;
            padding: 10px 0;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .week-day-name {
            font-size: 10px;
            font-weight: 600;
            color: var(--dim);
            text-transform: uppercase;
        }
        .week-day-num {
            font-size: 18px;
            font-weight: 800;
            margin-top: 4px;
        }
        .week-day-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            margin: 4px auto 0;
        }
        .week-day.active {
            background: var(--accent);
            color: var(--bg);
        }
        .week-day.active .week-day-name { color: var(--bg); }
        .week-day.has-tasks .week-day-dot { background: var(--accent); }
        .week-day.active .week-day-dot { background: var(--bg); }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task { animation: fadeIn 0.3s ease forwards; }
    </style>
</head>
<body>

<div id="app"></div>

<nav class="bottom-nav">
    <div class="nav-item active" data-view="today" onclick="switchView('today')">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Šiandien</span>
    </div>
    <div class="nav-item" data-view="week" onclick="switchView('week')">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Savaitė</span>
    </div>
    <div class="nav-item" data-view="projects" onclick="switchView('projects')">
        <span class="nav-icon">📁</span>
        <span class="nav-label">Projektai</span>
    </div>
</nav>

<script>
let DATA = null;
let DONE = JSON.parse(localStorage.getItem('skTasks_done') || '{}');
let currentView = 'today';
let selectedDate = null;

const DAYS_LT = ['Sk','Pr','An','Tr','Kt','Pn','Št'];
const MONTHS_LT = ['Sausio','Vasario','Kovo','Balandžio','Gegužės','Birželio','Liepos','Rugpjūčio','Rugsėjo','Spalio','Lapkričio','Gruodžio'];

async function init() {
    try {
        const res = await fetch('tasks.json?v=' + Date.now());
        DATA = await res.json();
    } catch(e) {
        document.getElementById('app').innerHTML = '<div class="empty"><div class="empty-icon">⚡</div><div class="empty-text">Nepavyko užkrauti</div><div class="empty-sub">Patikrink interneto ryšį</div></div>';
        return;
    }
    render();
}

function today() {
    return new Date().toISOString().split('T')[0];
}

function formatDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return `${MONTHS_LT[d.getMonth()]} ${d.getDate()}`;
}

function formatDay(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return DAYS_LT[d.getDay()];
}

function isOverdue(dateStr) {
    return dateStr < today() && !DONE[getTaskById(dateStr)];
}

function getTaskById(id) { return id; }

function toggleDone(id) {
    if (DONE[id]) {
        delete DONE[id];
    } else {
        DONE[id] = true;
    }
    localStorage.setItem('skTasks_done', JSON.stringify(DONE));
    render();
}

function switchView(view) {
    currentView = view;
    selectedDate = null;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelector(`.nav-item[data-view="${view}"]`).classList.add('active');
    render();
}

function selectDate(dateStr) {
    selectedDate = dateStr;
    render();
}

function renderTask(task, showDate = false) {
    const isDone = !!DONE[task.id];
    const isToday = task.date === today();
    const overdue = task.date < today() && !isDone;
    const proj = DATA.projects[task.project];

    return `
        <div class="task ${isDone ? 'done' : ''} ${overdue ? 'overdue' : ''} ${isToday ? 'today-task' : ''}" style="animation-delay: ${Math.random() * 0.1}s">
            <div class="task-check" onclick="toggleDone('${task.id}')"></div>
            <div class="task-body">
                <div class="task-meta">
                    <span class="task-project" style="background:${proj.color}22;color:${proj.color}">${proj.emoji} ${proj.name}</span>
                    ${task.type ? `<span class="task-type-badge type-${task.type}">${task.type}</span>` : ''}
                    ${showDate ? `<span class="task-date-badge">${overdue ? '⚠️ ' : ''}${formatDate(task.date)}</span>` : ''}
                </div>
                <div class="task-title">${task.title}</div>
                ${task.desc ? `<div class="task-desc">${task.desc}</div>` : ''}
            </div>
        </div>
    `;
}

function render() {
    if (!DATA) return;
    const app = document.getElementById('app');

    if (currentView === 'today') renderToday(app);
    else if (currentView === 'week') renderWeek(app);
    else if (currentView === 'projects') renderProjects(app);
}

function renderToday(app) {
    const todayStr = today();
    const d = new Date(todayStr + 'T12:00:00');

    const todayTasks = DATA.tasks.filter(t => t.date === todayStr);
    const overdueTasks = DATA.tasks.filter(t => t.date < todayStr && !DONE[t.id]);
    const upcomingTasks = DATA.tasks.filter(t => t.date > todayStr).slice(0, 5);

    const totalTasks = DATA.tasks.length;
    const doneTasks = DATA.tasks.filter(t => DONE[t.id]).length;
    const pct = Math.round((doneTasks / totalTasks) * 100);

    let html = `
        <div class="header">
            <div class="header-greeting">Labas, Skaiste 👋</div>
            <div class="header-date">${MONTHS_LT[d.getMonth()]} ${d.getDate()}, ${DAYS_LT[d.getDay()]}</div>
            <div class="header-stats">
                <span><strong>${todayTasks.length}</strong> šiandien</span>
                ${overdueTasks.length ? `<span><strong style="color:#ff6b6b">${overdueTasks.length}</strong> vėluoja</span>` : ''}
                <span><strong>${doneTasks}/${totalTasks}</strong> atlikta</span>
            </div>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="progress-text"><span>${pct}% atlikta</span><span>${totalTasks - doneTasks} liko</span></div>
        </div>
    `;

    if (overdueTasks.length) {
        html += `<div class="section">
            <div class="section-title">⚠️ Vėluoja <span class="section-count">${overdueTasks.length}</span></div>
            ${overdueTasks.map(t => renderTask(t, true)).join('')}
        </div>`;
    }

    if (todayTasks.length) {
        html += `<div class="section">
            <div class="section-title">Šiandien <span class="section-count">${todayTasks.length}</span></div>
            ${todayTasks.map(t => renderTask(t)).join('')}
        </div>`;
    }

    if (!todayTasks.length && !overdueTasks.length) {
        html += `<div class="empty"><div class="empty-icon">✨</div><div class="empty-text">Šiandien nieko!</div><div class="empty-sub">Mėgaukis laisva diena</div></div>`;
    }

    if (upcomingTasks.length) {
        html += `<div class="section">
            <div class="section-title">Artėja</div>
            ${upcomingTasks.map(t => renderTask(t, true)).join('')}
        </div>`;
    }

    app.innerHTML = html;
}

function renderWeek(app) {
    const todayStr = today();
    const todayDate = new Date(todayStr + 'T12:00:00');
    const startOfWeek = new Date(todayDate);
    startOfWeek.setDate(todayDate.getDate() - todayDate.getDay() + 1); // Monday

    let days = [];
    for (let i = 0; i < 14; i++) {
        const d = new Date(startOfWeek);
        d.setDate(startOfWeek.getDate() + i);
        const ds = d.toISOString().split('T')[0];
        const hasTasks = DATA.tasks.some(t => t.date === ds);
        days.push({ date: ds, day: d, hasTasks });
    }

    const sel = selectedDate || todayStr;
    const dayTasks = DATA.tasks.filter(t => t.date === sel);

    let html = `
        <div class="header">
            <div class="header-date">Savaitės vaizdas</div>
        </div>
        <div class="week-strip">
            ${days.map(d => `
                <div class="week-day ${d.date === sel ? 'active' : ''} ${d.hasTasks ? 'has-tasks' : ''}" onclick="selectDate('${d.date}')">
                    <div class="week-day-name">${DAYS_LT[d.day.getDay()]}</div>
                    <div class="week-day-num">${d.day.getDate()}</div>
                    <div class="week-day-dot"></div>
                </div>
            `).join('')}
        </div>
        <div class="section">
            <div class="section-title">${formatDate(sel)} <span class="section-count">${dayTasks.length}</span></div>
            ${dayTasks.length ? dayTasks.map(t => renderTask(t)).join('') : '<div class="empty"><div class="empty-icon">🌿</div><div class="empty-text">Nieko šią dieną</div></div>'}
        </div>
    `;
    app.innerHTML = html;
}

function renderProjects(app) {
    let html = `<div class="header"><div class="header-date">Projektai</div></div>`;

    for (const [key, proj] of Object.entries(DATA.projects)) {
        const projTasks = DATA.tasks.filter(t => t.project === key);
        const done = projTasks.filter(t => DONE[t.id]).length;
        const total = projTasks.length;
        if (total === 0) continue;
        const pct = Math.round((done / total) * 100);
        const upcoming = projTasks.filter(t => t.date >= today() && !DONE[t.id]).slice(0, 3);

        html += `
        <div class="section">
            <div class="section-title">${proj.emoji} ${proj.name} <span class="section-count">${done}/${total}</span></div>
            <div class="progress-wrap" style="padding:0;margin-bottom:12px">
                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${proj.color}"></div></div>
            </div>
            ${upcoming.map(t => renderTask(t, true)).join('')}
            ${upcoming.length < projTasks.filter(t => !DONE[t.id]).length ? `<div style="font-size:12px;color:var(--dim);padding:8px 0;">+ ${projTasks.filter(t => !DONE[t.id]).length - upcoming.length} daugiau...</div>` : ''}
        </div>`;
    }

    app.innerHTML = html;
}

// Service Worker Registration
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}

init();
</script>
</body>
</html>
